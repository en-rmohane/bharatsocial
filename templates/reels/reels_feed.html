{% extends 'base.html' %}
{% load static %}

{% block title %}Reels • BharatSocial{% endblock %}

{% block extra_css %}
<style>
    /* Viewport layout specifically tailored for Reels vertical feed centering */
    .reels-page-wrapper {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scrollbar-width: none;
        position: relative;
    }
    .reels-page-wrapper::-webkit-scrollbar {
        display: none;
    }
    
    .reel-card {
        width: 100%;
        height: 100vh;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        position: relative;
        background-color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .reel-video-container {
        width: 100%;
        height: 100%;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .reel-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        cursor: pointer;
    }
    
    .reel-sound-overlay {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.5);
        border-radius: 50%;
        padding: 8px;
        cursor: pointer;
        z-index: 100;
    }
    
    /* Side floating buttons panel */
    .reel-actions {
        position: absolute;
        bottom: 120px;
        right: 16px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        z-index: 50;
        color: white;
    }
    
    .reel-action-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: none;
        border: none;
        cursor: pointer;
        color: white;
        gap: 6px;
    }
    
    .action-icon-circle {
        background-color: rgba(0, 0, 0, 0.4);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255,255,255,0.2);
        transition: var(--transition);
    }
    
    .reel-action-btn:hover .action-icon-circle {
        background-color: rgba(0,0,0,0.6);
        transform: scale(1.05);
    }
    
    .reel-action-btn svg {
        width: 22px;
        height: 22px;
        stroke: white;
    }
    
    .reel-action-btn.liked svg {
        fill: var(--accent-color);
        stroke: var(--accent-color);
    }
    
    .reel-action-btn .count {
        font-size: 12px;
        font-weight: 600;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
    }
    
    /* Bottom overlay details */
    .reel-meta-bottom {
        position: absolute;
        bottom: 20px;
        left: 20px;
        right: 80px;
        z-index: 50;
        color: white;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    
    .reel-user-row {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .reel-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 2px solid white;
    }
    
    .reel-username {
        font-weight: 600;
        font-size: 14px;
    }
    
    .reel-follow-btn {
        background: none;
        border: 1px solid white;
        border-radius: 4px;
        color: white;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 600;
    }
    
    .reel-caption {
        font-size: 13.5px;
        line-height: 1.4;
    }
    
    /* Sliding comments drawer overlay */
    .comments-drawer {
        position: fixed;
        bottom: -100%;
        left: 50%;
        transform: translateX(-50%);
        width: 100%;
        max-width: 500px;
        height: 60vh;
        background-color: var(--bg-primary);
        border-top-left-radius: var(--radius-md);
        border-top-right-radius: var(--radius-md);
        z-index: 200;
        display: flex;
        flex-direction: column;
        box-shadow: 0 -4px 30px rgba(0,0,0,0.3);
        transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .comments-drawer.active {
        bottom: 0;
    }
    
    .drawer-header {
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
    }
    
    .drawer-comments-scroll {
        flex-grow: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        background-color: var(--bg-secondary);
    }
    
    .drawer-comment-item {
        display: flex;
        gap: 12px;
        align-items: flex-start;
    }
    
    .drawer-input-area {
        padding: 16px;
        border-top: 1px solid var(--border-color);
        display: flex;
        gap: 12px;
        align-items: center;
    }
    
    .drawer-input-area input {
        flex-grow: 1;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 8px 16px;
        background-color: var(--bg-secondary);
        font-size: 14px;
    }
    
    .drawer-close-btn {
        font-size: 24px;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div style="background-color: #000; width: 100%; height: 100vh;">
    
    <!-- Vertical reels viewport -->
    <div class="reels-page-wrapper" id="reels-container">
        <!-- Reels loaded dynamically by reels.js -->
    </div>
    
    <!-- Floating Drawer overlay -->
    <div class="comments-drawer" id="reels-comments-drawer">
        <div class="drawer-header">
            <span>Comments</span>
            <span class="drawer-close-btn" onclick="closeReelComments()">&times;</span>
        </div>
        <div class="drawer-comments-scroll" id="reels-comments-list"></div>
        <div class="drawer-input-area">
            <input type="text" placeholder="Add a comment..." id="reels-comment-input" onkeyup="if(event.key==='Enter')postReelComment()">
            <button class="comment-post-btn" onclick="postReelComment()">Post</button>
        </div>
    </div>
    
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/reels.js' %}"></script>
{% endblock %}
