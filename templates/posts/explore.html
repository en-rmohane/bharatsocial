{% extends 'base.html' %}
{% load static %}

{% block title %}Explore • BharatSocial{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/profile.css' %}">
<style>
    .explore-search-container {
        width: 100%;
        max-width: 935px;
        margin: 20px auto;
        position: relative;
        padding: 0 20px;
    }
    .search-box-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 10px 16px;
        background-color: var(--bg-secondary);
        width: 100%;
    }
    .search-box-wrapper svg {
        width: 20px;
        height: 20px;
        stroke: var(--text-secondary);
        margin-right: 12px;
    }
    .search-box-wrapper input {
        width: 100%;
        font-size: 15px;
    }
    .search-autocomplete-panel {
        position: absolute;
        top: 52px;
        left: 20px;
        right: 20px;
        background-color: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-large);
        display: none;
        flex-direction: column;
        z-index: 100;
        max-height: 300px;
        overflow-y: auto;
    }
    .search-result-header {
        padding: 12px 16px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        background-color: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
    }
    .search-result-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border-color);
        cursor: pointer;
        transition: var(--transition);
    }
    .search-result-item:hover {
        background-color: var(--hover-bg);
    }
    .trending-tags-row {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 16px 20px;
        scrollbar-width: none;
    }
    .tag-chip {
        padding: 8px 16px;
        border-radius: var(--radius-lg);
        background-color: var(--bg-secondary);
        border: 1px solid var(--border-color);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        white-space: nowrap;
    }
    .tag-chip:hover {
        background-color: var(--hover-bg);
    }

    @media (max-width: 480px) {
        .explore-search-container {
            padding: 0 10px;
            margin: 10px auto;
        }
        .search-autocomplete-panel {
            left: 10px;
            right: 10px;
            top: 48px;
        }
        .trending-tags-row {
            padding: 8px 10px;
            gap: 8px;
        }
        .tag-chip {
            padding: 6px 12px;
            font-size: 12px;
        }
        .profile-layout {
            padding: 0 !important;
        }
        .profile-grid {
            gap: 3px;
        }
        .explore-grid-container {
            padding: 0 10px !important;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="profile-layout" style="padding: 10px 0;">
    
    <!-- Search Inputs -->
    <div class="explore-search-container">
        <div class="search-box-wrapper">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Search users or hashtags..." id="explore-search-input" oninput="handleSearchAutocomplete(this.value)" autocomplete="off" data-i18n="search_placeholder">
        </div>
        
        <!-- Dropdown Result Panel -->
        <div class="search-autocomplete-panel" id="autocomplete-results"></div>
    </div>
    
    <!-- Trending tags chips -->
    <div class="trending-tags-row">
        {% for tag in popular_hashtags %}
        <div class="tag-chip" onclick="filterByHashtag('{{ tag.name }}')">#{{ tag.name }}</div>
        {% endfor %}
    </div>
 
    <!-- Explore grid posts -->
    <div class="explore-grid-container" style="padding: 0 20px;">
        <div class="profile-grid" id="explore-grid-list">
            <!-- Dynamic Grid elements injected by JS -->
        </div>
        
        <!-- Spinner loader -->
        <div id="explore-loader" style="text-align: center; padding: 40px 0;">
            <svg viewBox="0 0 50 50" style="width: 30px; height: 30px; animation: spin 1s linear infinite; stroke: var(--accent-color); fill: none; stroke-width: 5; stroke-linecap: round; margin: 0 auto;">
                <circle cx="25" cy="25" r="20"></circle>
            </svg>
        </div>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
    let exploreNextUrl = '/api/posts/explore/';
    let loadingExplore = false;
    
    document.addEventListener('DOMContentLoaded', () => {
        // Parse hashtag filter from URL query
        const urlParams = new URLSearchParams(window.location.search);
        const hashtagParam = urlParams.get('hashtag');
        if (hashtagParam) {
            exploreNextUrl = `/api/posts/explore/?hashtag=${hashtagParam}`;
            const searchInput = document.getElementById('explore-search-input');
            if (searchInput) searchInput.value = `#${hashtagParam}`;
        }

        loadExplorePosts();
        initExploreInfiniteScroll();

        // Close search results dropdown on click outside
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('autocomplete-results');
            const searchBox = document.querySelector('.search-box-wrapper');
            if (panel && !panel.contains(e.target) && !searchBox.contains(e.target)) {
                panel.style.display = 'none';
            }
        });
    });

    function loadExplorePosts() {
        if (!exploreNextUrl || loadingExplore) return;
        loadingExplore = true;
        
        const loader = document.getElementById('explore-loader');
        if (loader) loader.style.display = 'block';

        fetch(exploreNextUrl)
            .then(res => res.json())
            .then(data => {
                exploreNextUrl = data.next;
                renderExplorePosts(data.results);
                loadingExplore = false;
                if (loader) loader.style.display = 'none';
            })
            .catch(err => {
                console.error(err);
                loadingExplore = false;
                if (loader) loader.style.display = 'none';
            });
    }

    function renderExplorePosts(posts) {
        const grid = document.getElementById('explore-grid-list');
        if (!posts || posts.length === 0) return;

        posts.forEach(post => {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.onclick = () => window.location.href = `/post/${post.id}/`;
            
            const firstMedia = post.media[0];
            let mediaElement = '';
            if (firstMedia) {
                if (firstMedia.is_video) {
                    mediaElement = `<video src="${firstMedia.file}" muted></video>`;
                } else {
                    mediaElement = `<img src="${firstMedia.file}" alt="Explore item" loading="lazy">`;
                }
            }
            
            item.innerHTML = `
                ${mediaElement}
                <div class="grid-item-overlay">
                    <div class="overlay-stat">
                        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        <span>${post.likes_count}</span>
                    </div>
                    <div class="overlay-stat">
                        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        <span>${post.comments_count}</span>
                    </div>
                </div>
            `;
            grid.appendChild(item);
        });
    }

    // --- Autocomplete Live Search ---
    function handleSearchAutocomplete(query) {
        const panel = document.getElementById('autocomplete-results');
        if (!query.trim()) {
            panel.style.display = 'none';
            return;
        }

        fetch(`/api/search/autocomplete/?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                panel.innerHTML = '';
                if (data.users.length === 0 && data.hashtags.length === 0) {
                    panel.innerHTML = `<div style="padding:16px; font-size:13px; color:var(--text-secondary); text-align:center;">No results found</div>`;
                    panel.style.display = 'flex';
                    return;
                }

                panel.style.display = 'flex';

                if (data.users.length > 0) {
                    const userHeader = document.createElement('div');
                    userHeader.className = 'search-result-header';
                    userHeader.textContent = 'USERS';
                    panel.appendChild(userHeader);

                    data.users.forEach(user => {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.onclick = () => window.location.href = `/profile/${user.username}/`;
                        item.innerHTML = `
                            <img src="${user.avatar}" class="post-avatar" style="width:30px;height:30px;">
                            <span style="font-weight:600; font-size:14px;">${user.username}</span>
                        `;
                        panel.appendChild(item);
                    });
                }

                if (data.hashtags.length > 0) {
                    const tagHeader = document.createElement('div');
                    tagHeader.className = 'search-result-header';
                    tagHeader.textContent = 'HASHTAGS';
                    panel.appendChild(tagHeader);

                    data.hashtags.forEach(tag => {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.onclick = () => filterByHashtag(tag.name);
                        item.innerHTML = `
                            <div style="width:30px;height:30px;border-radius:50%;background-color:var(--bg-secondary);border:1px solid var(--border-color);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;">#</div>
                            <span style="font-weight:600; font-size:14px;">#${tag.name}</span>
                        `;
                        panel.appendChild(item);
                    });
                }
            })
            .catch(err => console.error(err));
    }

    function filterByHashtag(tagName) {
        document.getElementById('explore-search-input').value = `#${tagName}`;
        document.getElementById('autocomplete-results').style.display = 'none';
        
        // Reset and reload explore grid
        document.getElementById('explore-grid-list').innerHTML = '';
        exploreNextUrl = `/api/posts/explore/?hashtag=${tagName}`;
        loadExplorePosts();
    }

    function initExploreInfiniteScroll() {
        const scrollTrigger = document.createElement('div');
        scrollTrigger.id = 'explore-scroll-trigger';
        scrollTrigger.style.height = '10px';
        document.getElementById('explore-grid-list').after(scrollTrigger);

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && exploreNextUrl && !loadingExplore) {
                    loadExplorePosts();
                }
            });
        }, { rootMargin: '200px' });

        observer.observe(scrollTrigger);
    }
</script>
<style>
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
{% endblock %}
