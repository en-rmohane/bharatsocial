{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed • BharatSocial{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-logo">Password Changed</h1>
        <p style="color:var(--text-secondary); text-align:center; font-size:14px; margin-bottom:20px;">
            Your password was changed successfully!
        </p>
        <a href="{% url 'feed' %}" class="auth-btn" style="width:100%; display:block;">Back to Feed</a>
    </div>
</div>
{% endblock %}
