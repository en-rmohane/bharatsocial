{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete • BharatSocial{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-logo">All Set!</h1>
        <p style="color:var(--text-secondary); text-align:center; font-size:14px; margin-bottom:20px;">
            Your password has been successfully reset. You can now log in.
        </p>
        <a href="{% url 'login' %}" class="auth-btn" style="width:100%; display:block;">Log In</a>
    </div>
</div>
{% endblock %}
