{% extends 'base.html' %}
{% load static %}

{% block title %}Profile Unavailable • BharatSocial{% endblock %}

{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:80vh; padding:20px; color:var(--text-secondary);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:72px; height:72px; margin-bottom:16px;">
        <circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
    </svg>
    <h1 style="font-size:24px; font-weight:700; color:var(--text-primary); margin-bottom:8px;">User Unavailable</h1>
    <p style="font-size:14px; max-width:400px;">
        You cannot view this profile because of restrictions on this account.
    </p>
    <a href="{% url 'feed' %}" class="profile-btn profile-btn-primary" style="margin-top:20px;">Go to Feed</a>
</div>
{% endblock %}
