{% extends 'base.html' %}
{% load static %}

{% block title %}Email Sent • BharatSocial{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-logo">Link Sent</h1>
        <p style="color:var(--text-secondary); text-align:center; font-size:14px; margin-bottom:20px;">
            We've sent an email with instructions to reset your password. Please check your inbox.
        </p>
        <a href="{% url 'login' %}" class="auth-btn" style="width:100%; display:block;">Back to login</a>
    </div>
</div>
{% endblock %}
